services:
  - type: web
    name: chainpulse-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 8080
    envVars:
      - key: GEMINI_API_KEY
        scope: build
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: RENDER
        value: "true"
