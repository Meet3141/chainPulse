services:
  - type: web
    name: chainpulse-backend
    env: python
    plan: free
    buildCommand: pip install -r chainpulse/backend/requirements.txt
    startCommand: uvicorn chainpulse.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        scope: build
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: RENDER
        value: "true"
